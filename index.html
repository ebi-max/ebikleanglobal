<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebiklean Global</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f4f6f8; color:#1f2937; }
    header { background:linear-gradient(135deg,#0f172a,#1e3a8a); color:#fff; padding:60px 20px; text-align:center; }
    header h1 { margin:0; font-size:2.4rem; }
    section { max-width:1000px; margin:auto; padding:30px 20px; }.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:15px; }

.card { background:#fff; padding:20px; border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }

h2 { color:#0f172a; }

.btn { display:inline-block; padding:12px 18px; background:#1e3a8a; color:#fff; border:none; border-radius:20px; cursor:pointer; margin-top:10px; text-decoration:none; }

.btn-green { background:#16a34a; }

.box { background:#fff; padding:20px; border-radius:14px; margin-top:15px; box-shadow:0 8px 20px rgba(0,0,0,0.06); }

footer { text-align:center; padding:30px; background:#0f172a; color:#fff; }

.whatsapp { position:fixed; bottom:20px; right:20px; background:#25D366; color:#fff; padding:15px; border-radius:50%; text-decoration:none; font-size:20px; }

input { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:1px solid #ccc; }

.admin { display:none; background:#111827; color:#fff; padding:20px; margin-top:20px; border-radius:14px; }

.admin-item { background:#1f2937; padding:10px; margin-bottom:10px; border-radius:10px; }

.small-btn { padding:6px 10px; font-size:12px; background:#ef4444; border:none; color:#fff; border-radius:8px; cursor:pointer; }

  </style>
</head>
<body><header>
  <h1>Ebiklean Global</h1>
</header><section>
  <div class="box">
    <h2>Select Service</h2><div class="grid">
  <div class="card">
    <h3>CAC Registration</h3>
    <button class="btn" onclick="selectService('CAC Registration',10000)">Choose</button>
  </div>

  <div class="card">
    <h3>NGO Registration</h3>
    <button class="btn" onclick="selectService('NGO Registration',35000)">Choose</button>
  </div>

  <div class="card">
    <h3>Interior Cleaning</h3>
    <button class="btn" onclick="selectService('Interior Cleaning',0)">Choose</button>
  </div>

  <div class="card">
    <h3>Laundry</h3>
    <button class="btn" onclick="selectService('Laundry',0)">Choose</button>
  </div>

  <div class="card">
    <h3>Waste Management</h3>
    <button class="btn" onclick="selectService('Waste Management',0)">Choose</button>
  </div>

  <div class="card">
    <h3>Graphic Design</h3>
    <button class="btn" onclick="selectService('Graphic Design',5000)">Choose</button>
  </div>
</div>

  </div>
</section><section>
  <div class="box">
    <h2>Booking Form</h2><p><b>Selected:</b> <span id="serviceName">None</span></p>
<p><b>Amount:</b> ₦<span id="amount">0</span></p>

<input id="name" placeholder="Full Name" />
<input id="phone" placeholder="Phone" />
<input id="email" placeholder="Email" />

<button class="btn btn-green" onclick="proceed()">Submit Request</button>

  </div>
</section><section>
  <div class="box">
    <h2>Payment</h2>
    <p>Fidelity Bank</p>
    <p>EBIKLEAN GLOBAL</p>
    <p>5601698668</p>
  </div>
</section><section class="admin" id="adminPanel">
  <h2>Admin Dashboard</h2>
  <div id="adminData"></div>
</section><footer>
  <p>© 2026 Ebiklean Global</p>
  <button class="small-btn" onclick="openAdmin()">Admin</button>
</footer><a class="whatsapp" id="wa" target="_blank">💬</a>

<script>

// 🔥 CLOUD ENDPOINT (YOU WILL REPLACE THIS)
const API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

let selectedService='';
let selectedAmount=0;

function selectService(name,amount){
  selectedService=name;
  selectedAmount=amount;

  document.getElementById('serviceName').innerText=name;
  document.getElementById('amount').innerText=amount;

  alert(name + " selected");
}

async function proceed(){

  let name=document.getElementById('name').value;
  let phone=document.getElementById('phone').value;
  let email=document.getElementById('email').value;

  if(!selectedService){alert("Select service");return;}

  let ref='EBK'+Math.floor(Math.random()*1000000);

  let data={
    name,
    phone,
    email,
    service:selectedService,
    amount:selectedAmount,
    ref,
    time:new Date().toLocaleString()
  };

  // 📡 SEND TO CLOUD DATABASE (Google Sheets via Apps Script)
  try{
    await fetch(API_URL,{method:"POST",body:JSON.stringify(data)});
  }catch(e){console.log("Cloud save failed",e);}

  let msg=`Hello, I am ${name}. Service: ${selectedService}. Ref:${ref}`;
  let url=`https://wa.me/2347031204549?text=${encodeURIComponent(msg)}`;

  document.getElementById('wa').href=url;
  window.open(url,'_blank');
}

// 🔐 ADMIN SYSTEM (CLOUD FETCH)
async function openAdmin(){

  let pass=prompt("Enter Admin Password");
  if(pass!="EBKADMIN2026"){alert("Wrong password");return;}

  let panel=document.getElementById('adminPanel');
  panel.style.display="block";

  let res = await fetch(API_URL);
  let data = await res.json();

  let html="";

  data.forEach(d=>{
    html+=`
    <div class='admin-item'>
      <b>${d.name}</b><br>
      ${d.service} - ₦${d.amount}<br>
      ${d.phone} | ${d.email}<br>
      Ref: ${d.ref}<br>
      ${d.time}
    </div>`;
  });

  document.getElementById('adminData').innerHTML=html;
}

</script></body>
</html>
